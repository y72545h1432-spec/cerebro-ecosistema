# cerebro_equipo.toml — configuracion del supervisor del Agent Team.
# Guardrails que REEMPLAZAN la prohibicion absoluta de la Regla Universal #3 (no auto-lanzar) por
# autorizacion ACOTADA y verificable. Editar con criterio: subir caps = mas gasto/carga.

max_workers = 3            # concurrencia dura (alineado con olas <=3 de investigacion-infinita / salud PC #10)
max_tasks_per_run = 12     # tope de tareas que un solo drenado reclama (no vacia colas gigantes de golpe)
worker_timeout_s = 600     # un worker colgado se mata a los 10 min
worker_budget_usd = 0.50   # presupuesto por worker (--max-budget-usd de claude -p)
run_budget_usd = 5.0       # presupuesto agregado del run; al superarlo, deja de lanzar
visibility_ttl_min = 30    # tras el drenado, reclama 'tomada' colgadas mas viejas que esto
permission_mode = "acceptEdits"   # headless sin TTY: nunca pedir permiso interactivo (colgaria)
workdir = ""               # --add-dir para los workers ("" = cwd del supervisor)

# Solo estos ejecutables pueden lanzarse como worker (allowlist anti-cualquier-cosa).
allowed_exes = ["claude", "claude.exe", "codex", "codex.exe"]

# Herramientas permitidas por tier (acota lo que un worker headless puede hacer).
[allowed_tools]
haiku = "Read Grep Glob"
sonnet = "Read Grep Glob Edit Write Bash"
opus = "Read Grep Glob Edit Write Bash"

# Anti fork-bomb: el worker NO puede invocar claude/codex/el supervisor (recursion de costos).
disallowed_tools = "Bash(claude:*) Bash(codex:*) Bash(*cerebro_equipo*) Bash(*cerebro.py equipo*)"

api_max_steps = 8          # pasos maximos del bucle agentico del runtime 'api' (anti-loop)

# ===================== ESTRATEGIA DE CALIDAD (gratis vs pago vs hibrido) =====================
# El Agent Team puede correr workers a COSTO $0 (runtime 'api', modelos gratis OpenAI-compatible) o
# con Claude (de pago, maxima calidad). Aqui eliges la politica POR DEFECTO; siempre puedes forzar
# por linea de comandos con --runtime claude|api o --modo gratis|pago|hibrido.
#
#   modo = "gratis"  -> TODO con modelos gratis (Groq/Gemini/OpenRouter). $0. Brecha de calidad en
#                       tareas dificiles (refactor multi-archivo, debug sutil). Ideal para probar/explorar.
#   modo = "pago"    -> TODO con Claude. Maxima calidad. Gasta tokens (ver budgets arriba).
#   modo = "hibrido" -> (DEFAULT) enruta por BRECHA: lo de brecha pequena gratis, lo dificil a Claude.
[calidad]
modo = "hibrido"
verificador = "auto"       # "auto" = una 2a pasada GRATIS critica las salidas de modelos gratis | true | false

# Enrutado del modo hibrido: que runtime usa cada cosa por DEFECTO.
# (debate y tareas faciles 'haiku' -> gratis; 'sonnet'/'opus' = mas dificiles -> Claude)
[calidad.hibrido]
debate = "api"
drenar_haiku = "api"
drenar_sonnet = "claude"
drenar_opus = "claude"

# ===================== PROVEEDORES GRATIS (runtime 'api') =====================
# Las CLAVES nunca van aqui (repo publico): se leen del entorno -> ver .env.example.
#   GROQ_API_KEY · GEMINI_API_KEY (o GOOGLE_API_KEY) · OPENROUTER_API_KEY
# Orden de respaldo: si el 1ro falla o agota cuota del dia, cae al siguiente automaticamente.
[api]
providers = ["groq", "gemini", "openrouter"]
# (opcional) sobreescribe el modelo por proveedor/tier si cambian los slugs gratuitos:
# [api.models.groq]
# sonnet = "llama-3.3-70b-versatile"
# [api.models.openrouter]
# sonnet = "deepseek/deepseek-r1:free"
